<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priprema 7</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaldi:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>

        ul{

            list-style: none;
        }

        nav div{

            background-color: rgb(41, 157, 225);
            width: 150px;
            padding: 30px 20px;
            text-align: center;
            font-size: 24px;
            display: inline-block;

            border-top-right-radius: 17px;
            border-top-left-radius: 17px;
            border-bottom-right-radius: 17px;

            font-family: "Jaldi";
            font-size: 400;
            font-style: normal;
        }

        a,i{


            transition: 0.5s;
        }

        i:hover{

            opacity: 0.5;
        }

        a:hover{
            text-shadow:  rgb(0, 0, 0) 2px 2px 2px;
        }

        nav{

            text-align: center;
        }

        a{

            text-decoration: none;
            color: white;
        }
    </style>

</head>
<body>
    <nav>

        <div>
            
            <a href="#"><i class="fa fa-home" aria-hidden="true"></i> Home</a>
        </div>

        

        <div>
           <a href=""> <i class="fa fa-info" aria-hidden="true"></i> About</a>
        </div>

        <div>
            <a href=""> <i class="fa fa-archive" aria-hidden="true"></i>
                Products</a>
        </div>

        <div>
            <a href=""><i class="fa fa-envelope" aria-hidden="true"></i> Contact</a>
        </div>
    </nav>
    
</body>
</html>
